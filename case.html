<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星禾元亨 · 案例</title>
<style>
:root {
  --bg: #06080D; --bg2: #0C1020; --surface: #111827; --border: #1E293B;
  --green: #10B981; --blue: #3B82F6; --purple: #8B5CF6; --orange: #F59E0B;
  --text: #F1F5F9; --text2: #94A3B8; --text3: #64748B;
  --radius: 16px; --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg); color: var(--text); line-height:1.75;
  -webkit-font-smoothing:antialiased;
}
::selection { background: var(--green); color:#000; }

/* Nav */
.case-nav {
  position:fixed; top:0; left:0; right:0; z-index:999;
  background: rgba(6,8,13,0.85); backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.04);
  padding:0 28px;
}
.case-nav-inner {
  max-width:900px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:62px;
}
.case-nav a { color:var(--green); font-size:14px; font-weight:600; text-decoration:none; }
.case-nav a:hover { text-decoration:underline; }

/* Hero Banner */
.case-hero {
  padding:120px 28px 60px;
  text-align:center;
  position:relative; overflow:hidden;
}
.case-hero::after {
  content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:400px; height:300px;
  background:radial-gradient(ellipse, rgba(16,185,129,0.05) 0%, transparent 70%);
  pointer-events:none;
}
.case-emoji { font-size:72px; margin-bottom:16px; }
.case-tag {
  display:inline-block; font-size:11px; font-weight:700; padding:4px 16px; border-radius:14px;
  margin-bottom:20px; letter-spacing:1px; text-transform:uppercase;
}
.case-tag.t1 { background:rgba(16,185,129,0.1); color:var(--green); }
.case-tag.t2 { background:rgba(139,92,246,0.1); color:var(--purple); }
.case-tag.t3 { background:rgba(245,158,11,0.1); color:var(--orange); }
.case-hero h1 { font-size:clamp(26px,4.5vw,40px); font-weight:900; letter-spacing:-0.5px; margin-bottom:12px; }
.case-hero-desc { font-size:16px; color:var(--text2); max-width:620px; margin:0 auto; line-height:1.8; }

/* KPI Cards */
.case-kpis {
  max-width:900px; margin:0 auto 50px; padding:0 28px;
  display:grid; grid-template-columns:repeat(3,1fr); gap:16px;
}
.case-kpi-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:24px; text-align:center;
}
.case-kpi-card .val { font-size:32px; font-weight:900; color:var(--green); margin-bottom:4px; }
.case-kpi-card .lbl { font-size:13px; color:var(--text3); }

/* Content */
.case-wrap { max-width:800px; margin:0 auto; padding:0 28px 80px; }
.case-body { font-size:16px; color:var(--text2); line-height:1.95; }

.case-body p { margin-bottom:18px; }
.case-body h2 { font-size:22px; font-weight:800; color:var(--text); margin:44px 0 18px; }
.case-body h3 { font-size:18px; font-weight:700; color:var(--text); margin:32px 0 14px; }
.case-body h4 { font-size:16px; font-weight:700; color:var(--text); margin:24px 0 10px; }
.case-body strong { color:var(--green); font-weight:600; }
.case-body ul, .case-body ol { margin:16px 0; padding-left:24px; }
.case-body li { margin-bottom:8px; }
.case-body table { width:100%; border-collapse:collapse; margin:20px 0; font-size:14px; }
.case-body th { background:var(--surface); color:var(--text); font-weight:700; padding:12px 16px; text-align:left; border:1px solid var(--border); }
.case-body td { padding:10px 16px; border:1px solid var(--border); }
.case-body blockquote {
  border-left:3px solid var(--green); padding:12px 20px; margin:20px 0;
  background:rgba(16,185,129,0.04); font-style:italic; border-radius:0 8px 8px 0;
}

.case-back { margin-top:60px; padding-top:30px; border-top:1px solid var(--border); }
.case-back a { color:var(--green); font-size:14px; font-weight:600; text-decoration:none; }
.case-back a:hover { text-decoration:underline; }

/* Footer */
.case-foot { border-top:1px solid var(--border); padding:32px 28px; text-align:center; font-size:13px; color:var(--text3); }

.case-loading, .case-error { text-align:center; padding:120px 28px; }
.case-error h2 { color:var(--text); margin-bottom:12px; }
.case-error a { color:var(--green); }

@media (max-width:640px) {
  .case-kpis { grid-template-columns:1fr; }
  .case-kpi-card .val { font-size:28px; }
}
</style>
</head>
<body>

<nav class="case-nav">
  <div class="case-nav-inner">
    <a href="index.html" style="color:var(--text);font-size:16px;"><span style="color:var(--green)">星禾元亨</span> · AI自动化</a>
    <a href="index.html#cases">← 返回案例列表</a>
  </div>
</nav>

<main id="caseContent">
  <div class="case-loading" style="text-align:center;padding:120px 28px;color:var(--text3);">加载中...</div>
</main>

<footer class="case-foot">
  © 2026 星禾元亨AI自动化 · 深圳
</footer>

<script>
function parseContent(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inList = null;

  for (let line of lines) {
    const trimmed = line.trim();
    if (!trimmed) {
      if (inList) { html += `</${inList}>`; inList = null; }
      continue;
    }

    if (trimmed.startsWith('|')) {
      if (inList) { html += `</${inList}>`; inList = null; }
      const cells = trimmed.split('|').filter(c => c.trim());
      if (cells.every(c => /^[-:]+$/.test(c.trim()))) continue;
      const isHeader = !html.includes('<table>') || html.lastIndexOf('</table>') > html.lastIndexOf('<table>');
      if (!html.endsWith('</table>') && !html.match(/<table>[^<]*$/)) html += '<table>';
      html += '<tr>';
      cells.forEach(c => html += isHeader ? `<th>${c.trim()}</th>` : `<td>${c.trim()}</td>`);
      html += '</tr>';
      continue;
    }
    if (!trimmed.startsWith('|') && html.lastIndexOf('<table>') > html.lastIndexOf('</table>')) {
      html += '</table>';
    }

    if (trimmed.startsWith('### ')) {
      if (inList) { html += `</${inList}>`; inList = null; }
      html += `<h3>${trimmed.slice(4)}</h3>`; continue;
    }
    if (trimmed.startsWith('## ')) {
      if (inList) { html += `</${inList}>`; inList = null; }
      html += `<h2>${trimmed.slice(3)}</h2>`; continue;
    }
    if (trimmed.startsWith('# ')) {
      if (inList) { html += `</${inList}>`; inList = null; }
      html += `<h2>${trimmed.slice(2)}</h2>`; continue;
    }

    let processed = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    if (processed.startsWith('> ')) {
      if (inList) { html += `</${inList}>`; inList = null; }
      html += `<blockquote>${processed.slice(2)}</blockquote>`; continue;
    }

    if (/^[-*]\s/.test(processed)) {
      if (inList !== 'ul') { if (inList) html += `</${inList}>`; html += '<ul>'; inList = 'ul'; }
      html += `<li>${processed.replace(/^[-*]\s/, '')}</li>`; continue;
    }

    if (/^\d+\.\s/.test(processed)) {
      if (inList !== 'ol') { if (inList) html += `</${inList}>`; html += '<ol>'; inList = 'ol'; }
      html += `<li>${processed.replace(/^\d+\.\s/, '')}</li>`; continue;
    }

    if (inList) { html += `</${inList}>`; inList = null; }
    html += `<p>${processed}</p>`;
  }

  if (inList) html += `</${inList}>`;
  if (html.lastIndexOf('<table>') > html.lastIndexOf('</table>')) html += '</table>';
  return html;
}

async function loadCase() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const container = document.getElementById('caseContent');

  if (!id) {
    container.innerHTML = '<div class="case-error"><h2>案例未找到</h2><p><a href="index.html#cases">← 返回案例列表</a></p></div>';
    return;
  }

  try {
    const res = await fetch('data/cases.json');
    const cases = await res.json();
    const c = cases.find(x => x.id === id);

    if (!c) {
      container.innerHTML = '<div class="case-error"><h2>案例未找到</h2><p><a href="index.html#cases">← 返回案例列表</a></p></div>';
      return;
    }

    document.title = c.title + ' · 星禾元亨';
    container.innerHTML = `
      <div class="case-hero">
        <div class="case-emoji">${c.emoji}</div>
        <span class="case-tag ${c.color}">${c.tag}</span>
        <h1>${c.title}</h1>
        <p class="case-hero-desc">${c.desc}</p>
      </div>
      <div class="case-kpis">
        ${c.kpi.map(k => `
          <div class="case-kpi-card">
            <div class="val">${k.value}</div>
            <div class="lbl">${k.label}</div>
          </div>
        `).join('')}
      </div>
      <div class="case-wrap">
        <div class="case-body">
          ${parseContent(c.detail || c.desc)}
        </div>
        <div class="case-back">
          <a href="index.html#cases">← 返回案例列表</a>
        </div>
      </div>
    `;
  } catch(e) {
    container.innerHTML = '<div class="case-error"><h2>加载失败</h2><p><a href="index.html#cases">← 返回案例列表</a></p></div>';
  }
}

document.addEventListener('DOMContentLoaded', loadCase);
</script>

</body>
</html>
