<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鏄熺鍏冧酣 路 鍚庡彴绠＄悊</title>
<style>
:root {
  --bg: #080C14;
  --bg2: #0F1525;
  --surface: #151C2F;
  --border: #1E2A44;
  --border-hover: #2A3A5C;
  --green: #10B981;
  --green-d: #059669;
  --blue: #3B82F6;
  --purple: #8B5CF6;
  --orange: #F59E0B;
  --red: #EF4444;
  --text: #F1F5F9;
  --text2: #94A3B8;
  --text3: #64748B;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); line-height:1.6;
  display:flex; height:100vh; overflow:hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width:240px; background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; flex-shrink:0;
}
.sidebar-logo {
  padding:20px; font-size:18px; font-weight:800; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}
.sidebar-logo span { color:var(--green); }
.sidebar-nav { flex:1; padding:12px; }
.sidebar-nav a {
  display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:var(--radius-sm);
  color:var(--text2); text-decoration:none; font-size:14px; font-weight:600;
  transition:all .2s; margin-bottom:4px;
}
.sidebar-nav a:hover, .sidebar-nav a.active {
  background:rgba(16,185,129,0.08); color:var(--green);
}
.sidebar-nav a .icon { font-size:18px; width:24px; text-align:center; }
.sidebar-footer { padding:16px; border-top:1px solid var(--border); }
.sidebar-footer .stat { font-size:12px; color:var(--text3); }
.sidebar-footer .stat strong { color:var(--text); display:block; font-size:14px; }

/* ===== MAIN ===== */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar {
  height:62px; background:var(--bg2); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; padding:0 28px; flex-shrink:0;
}
.topbar h2 { font-size:18px; font-weight:700; }
.topbar-actions { display:flex; gap:10px; align-items:center; }
.topbar-status { font-size:12px; color:var(--text3); display:flex; align-items:center; gap:6px; }
.topbar-status .dot { width:7px; height:7px; border-radius:50%; }
.topbar-status .dot.ok { background:var(--green); }
.topbar-status .dot.err { background:var(--red); }
.topbar-status .dot.sync { background:var(--orange); animation:blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.content { flex:1; overflow-y:auto; padding:28px; }

/* ===== BUTTONS ===== */
.btn {
  display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:20px;
  font-size:13px; font-weight:600; cursor:pointer; transition:all .25s; border:none;
  text-decoration:none;
}
.btn-primary { background:linear-gradient(135deg,#10B981,#059669); color:#fff; }
.btn-primary:hover { box-shadow:0 4px 16px rgba(16,185,129,0.3); transform:translateY(-1px); }
.btn-ghost { background:transparent; color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--green); color:var(--green); }
.btn-danger { background:rgba(239,68,68,0.1); color:var(--red); border:1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background:rgba(239,68,68,0.2); }
.btn-publish {
  background:linear-gradient(135deg,#3B82F6,#8B5CF6); color:#fff;
  box-shadow:0 2px 12px rgba(139,92,246,0.25);
}
.btn-publish:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(139,92,246,0.4); }
.btn-sm { padding:6px 14px; font-size:12px; border-radius:14px; }
.btn-icon { padding:6px 10px; font-size:14px; }

/* ===== CARDS / LIST ===== */
.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(360px, 1fr)); gap:16px; }
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:22px; transition:all .25s;
}
.card:hover { border-color:var(--border-hover); }
.card-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-head h4 { font-size:16px; font-weight:700; line-height:1.4; flex:1; margin-right:12px; }
.card-meta { font-size:12px; color:var(--text3); margin-bottom:10px; display:flex; gap:16px; }
.card-body { font-size:13px; color:var(--text2); line-height:1.7; margin-bottom:14px; }
.card-tags { display:flex; gap:6px; flex-wrap:wrap; }
.card-tag {
  font-size:11px; padding:3px 10px; border-radius:10px;
  background:rgba(139,92,246,0.08); color:var(--purple);
}
.card-actions { display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }

.case-card-admin { display:flex; gap:16px; align-items:flex-start; }
.case-card-admin .case-emoji {
  width:56px; height:56px; border-radius:var(--radius-sm); display:flex;
  align-items:center; justify-content:center; font-size:28px; flex-shrink:0;
}
.case-card-admin .case-emoji.e1 { background:linear-gradient(135deg,#064E3B,#047857); }
.case-card-admin .case-emoji.e2 { background:linear-gradient(135deg,#312E81,#4338CA); }
.case-card-admin .case-emoji.e3 { background:linear-gradient(135deg,#7C2D12,#C2410C); }
.case-kpi-admin { display:flex; gap:20px; margin-top:10px; }
.case-kpi-admin .kv { font-size:20px; font-weight:900; color:var(--green); }
.case-kpi-admin .kl { font-size:11px; color:var(--text3); }

/* ===== MODAL ===== */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100;
  align-items:center; justify-content:center;
}
.modal-overlay.on { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  width:600px; max-height:85vh; overflow-y:auto; padding:0;
}
.modal-header {
  padding:20px 24px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
}
.modal-header h3 { font-size:17px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text2); font-size:22px; cursor:pointer; padding:4px; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:24px; }
.modal-footer {
  padding:16px 24px; border-top:1px solid var(--border);
  display:flex; justify-content:flex-end; gap:8px;
}

/* ===== FORM ===== */
.form-group { margin-bottom:18px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--text2); margin-bottom:6px; }
.form-group input, .form-group textarea, .form-group select {
  width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text); font-size:14px; font-family:inherit;
  transition:border-color .2s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline:none; border-color:var(--green);
}
.form-group textarea { resize:vertical; min-height:80px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.tag-input-wrap { display:flex; gap:6px; flex-wrap:wrap; align-items:center; padding:6px 10px;
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); min-height:42px;
}
.tag-input-wrap input { flex:1; min-width:80px; background:transparent; border:none; outline:none;
  color:var(--text); font-size:13px; padding:2px;
}
.tag-chip {
  display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 8px;
  border-radius:8px; background:rgba(16,185,129,0.1); color:var(--green);
}
.tag-chip .rm { cursor:pointer; font-size:14px; line-height:1; }
.tag-chip .rm:hover { color:var(--red); }
.kpi-row { display:flex; gap:10px; align-items:flex-end; margin-bottom:8px; }
.kpi-row input { flex:1; }
.kpi-row .btn-icon { flex-shrink:0; }

/* ===== TOAST ===== */
.toast {
  position:fixed; bottom:30px; right:30px; z-index:200;
  padding:12px 22px; border-radius:var(--radius-sm); font-size:14px; font-weight:600;
  transform:translateY(100px); opacity:0; transition:all .3s;
}
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { background:var(--green); color:#000; }
.toast.error { background:var(--red); color:#fff; }
.toast.info { background:var(--blue); color:#fff; }

/* ===== EMPTY ===== */
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-state .big { font-size:48px; margin-bottom:16px; }
.empty-state p { font-size:15px; margin-bottom:20px; }

/* ===== RESPONSIVE ===== */
@media (max-width:768px) {
  .sidebar { width:60px; }
  .sidebar-logo { font-size:0; justify-content:center; }
  .sidebar-logo span { font-size:20px; }
  .sidebar-nav a { justify-content:center; padding:12px; }
  .sidebar-nav a span:not(.icon) { display:none; }
  .sidebar-footer { display:none; }
  .card-grid { grid-template-columns:1fr; }
  .modal { width:95vw; }
  .form-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo"><span>鈿?/span> 鏄熺鍏冧酣 路 鍚庡彴</div>
  <nav class="sidebar-nav">
    <a href="#" class="active" data-tab="articles">
      <span class="icon">馃摑</span> <span>鏂囩珷绠＄悊</span>
    </a>
    <a href="#" data-tab="cases">
      <span class="icon">馃搳</span> <span>妗堜緥绠＄悊</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="stat" id="stats">鍔犺浇涓?..</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <h2 id="pageTitle">馃摑 鏂囩珷绠＄悊</h2>
    <div class="topbar-actions">
      <span class="topbar-status" id="topStatus">
        <span class="dot ok"></span> <span id="statusText">宸茶繛鎺?/span>
      </span>
      <button class="btn btn-primary" id="btnNew" onclick="openModal()">+ 鏂板缓</button>
      <button class="btn btn-publish" onclick="doPublish()" id="btnPublish">馃殌 鍙戝竷涓婄嚎</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">鏂板缓鏂囩珷</h3>
      <button class="modal-close" onclick="closeModal()">鉁?/button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">鍙栨秷</button>
      <button class="btn btn-primary" id="btnSave" onclick="saveItem()">淇濆瓨</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let currentTab = 'articles';
let currentItem = null;
let isEdit = false;

// ===== TOAST =====
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== NAVIGATION =====
document.querySelectorAll('.sidebar-nav a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('.sidebar-nav a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    currentTab = a.dataset.tab;
    document.getElementById('pageTitle').textContent = currentTab === 'articles' ? '馃摑 鏂囩珷绠＄悊' : '馃搳 妗堜緥绠＄悊';
    document.getElementById('btnNew').textContent = currentTab === 'articles' ? '+ 鏂板缓鏂囩珷' : '+ 鏂板缓妗堜緥';
    loadList();
  });
});

// ===== MODAL =====
function openModal(item=null) {
  isEdit = !!item;
  currentItem = item;
  document.getElementById('modalOverlay').classList.add('on');

  if (currentTab === 'articles') {
    document.getElementById('modalTitle').textContent = isEdit ? '缂栬緫鏂囩珷' : '鏂板缓鏂囩珷';
    document.getElementById('modalBody').innerHTML = `
      <div class="form-group"><label>鏂囩珷鏍囬 *</label><input id="fTitle" value="${item?.title||''}" placeholder="杈撳叆鏂囩珷鏍囬"></div>
      <div class="form-row">
        <div class="form-group"><label>鏃ユ湡</label><input id="fDate" value="${item?.date||''}" placeholder="濡傦細姣忓懆鏇存柊 / 2026-06-23"></div>
        <div class="form-group"><label>鍒嗙被</label><input id="fCat" value="${item?.category||''}" placeholder="濡傦細Token浠ｇ悊"></div>
      </div>
      <div class="form-group"><label>鎽樿</label><textarea id="fSummary" rows="3" placeholder="杈撳叆鏂囩珷鎽樿">${item?.summary||''}</textarea></div>
      <div class="form-group">
        <label>鏍囩锛堝洖杞︽坊鍔狅級</label>
        <div class="tag-input-wrap" id="tagWrap">
          <input id="fTagInput" placeholder="杈撳叆鏍囩鍚庡洖杞?>
        </div>
        <input type="hidden" id="fTags" value='${JSON.stringify(item?.tags||[])}'>
      </div>
    `;
    // Init tags
    setTimeout(() => {
      const tags = JSON.parse(document.getElementById('fTags').value || '[]');
      tags.forEach(addTagChip);
      const inp = document.getElementById('fTagInput');
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addTag(e.target.value.trim()); e.target.value=''; }
      });
    }, 50);
  } else {
    document.getElementById('modalTitle').textContent = isEdit ? '缂栬緫妗堜緥' : '鏂板缓妗堜緥';
    const kpis = item?.kpi || [{value:'',label:''}];
    document.getElementById('modalBody').innerHTML = `
      <div class="form-group"><label>妗堜緥鏍囬 *</label><input id="fTitle" value="${item?.title||''}" placeholder="濡傦細娣卞湷鏌怉I鍒濆垱鍏徃"></div>
      <div class="form-row">
        <div class="form-group"><label>鏍囩鏂囧瓧</label><input id="fTag" value="${item?.tag||''}" placeholder="濡傦細TOB 路 Token浠ｇ悊"></div>
        <div class="form-group"><label>鏍囩棰滆壊</label>
          <select id="fColor">
            <option value="t1" ${item?.color==='t1'?'selected':''}>缁胯壊 (Token浠ｇ悊)</option>
            <option value="t2" ${item?.color==='t2'?'selected':''}>绱壊 (AI瀹㈡湇)</option>
            <option value="t3" ${item?.color==='t3'?'selected':''}>姗欒壊 (瀹炰綋/GEO)</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>鑳屾櫙鏍峰紡</label>
          <select id="fBg">
            <option value="e1" ${item?.bg==='e1'?'selected':''}>缁胯壊娓愬彉</option>
            <option value="e2" ${item?.bg==='e2'?'selected':''}>绱壊娓愬彉</option>
            <option value="e3" ${item?.bg==='e3'?'selected':''}>姗欒壊娓愬彉</option>
          </select>
        </div>
        <div class="form-group"><label>Emoji</label><input id="fEmoji" value="${item?.emoji||'馃拵'}" placeholder="濡傦細馃拵"></div>
      </div>
      <div class="form-group"><label>鎻忚堪</label><textarea id="fDesc" rows="3" placeholder="妗堜緥鎻忚堪">${item?.desc||''}</textarea></div>
      <div class="form-group">
        <label>KPI 鏁版嵁 <button class="btn btn-ghost btn-sm" onclick="addKpiRow()" type="button" style="float:right">+ 娣诲姞</button></label>
        <div id="kpiContainer">
          ${kpis.map((k,i) => `
            <div class="kpi-row">
              <input value="${k.value}" placeholder="鏁板€硷紙濡傦細-58%锛? class="kpi-val">
              <input value="${k.label}" placeholder="鏍囩锛堝锛歍oken鎴愭湰锛? class="kpi-lbl">
              <button class="btn btn-ghost btn-icon" onclick="this.parentElement.remove()" type="button">馃棏</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('on');
  currentItem = null;
  isEdit = false;
}

// Tags
function getTags() {
  const chips = document.querySelectorAll('#tagWrap .tag-chip');
  return Array.from(chips).map(c => c.dataset.tag);
}
function addTagChip(tag) {
  const wrap = document.getElementById('tagWrap');
  const inp = document.getElementById('fTagInput');
  const existing = Array.from(wrap.querySelectorAll('.tag-chip')).map(c => c.dataset.tag);
  if (!tag || existing.includes(tag)) return;
  const chip = document.createElement('span');
  chip.className = 'tag-chip';
  chip.dataset.tag = tag;
  chip.innerHTML = `${tag}<span class="rm" onclick="this.parentElement.remove()">脳</span>`;
  wrap.insertBefore(chip, inp);
}
function addTag(tag) { if(tag) addTagChip(tag); }

// KPI
function addKpiRow() {
  const c = document.getElementById('kpiContainer');
  const row = document.createElement('div');
  row.className = 'kpi-row';
  row.innerHTML = `
    <input value="" placeholder="鏁板€硷紙濡傦細-58%锛? class="kpi-val">
    <input value="" placeholder="鏍囩锛堝锛歍oken鎴愭湰锛? class="kpi-lbl">
    <button class="btn btn-ghost btn-icon" onclick="this.parentElement.remove()" type="button">馃棏</button>
  `;
  c.appendChild(row);
}

// ===== SAVE =====
async function saveItem() {
  const title = document.getElementById('fTitle')?.value.trim();
  if (!title) return showToast('鏍囬涓嶈兘涓虹┖', 'error');

  let data;
  if (currentTab === 'articles') {
    data = {
      title,
      date: document.getElementById('fDate').value.trim(),
      category: document.getElementById('fCat').value.trim(),
      summary: document.getElementById('fSummary').value.trim(),
      tags: getTags()
    };
  } else {
    const kpis = Array.from(document.querySelectorAll('#kpiContainer .kpi-row')).map(r => ({
      value: r.querySelector('.kpi-val').value.trim(),
      label: r.querySelector('.kpi-lbl').value.trim()
    })).filter(k => k.value || k.label);
    data = {
      title,
      tag: document.getElementById('fTag').value.trim(),
      color: document.getElementById('fColor').value,
      bg: document.getElementById('fBg').value,
      emoji: document.getElementById('fEmoji').value.trim(),
      desc: document.getElementById('fDesc').value.trim(),
      kpi: kpis
    };
  }

  try {
    const url = isEdit
      ? `${API}/${currentTab}/${currentItem.id}`
      : `${API}/${currentTab}`;
    const method = isEdit ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method, headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error(await res.text());
    showToast(isEdit ? '鏇存柊鎴愬姛' : '鍒涘缓鎴愬姛');
    closeModal();
    loadList();
  } catch(e) {
    showToast('淇濆瓨澶辫触: ' + e.message, 'error');
  }
}

// ===== DELETE =====
async function deleteItem(id) {
  if (!confirm('纭畾鍒犻櫎锛熸鎿嶄綔涓嶅彲鎾ら攢銆?)) return;
  try {
    const res = await fetch(`${API}/${currentTab}/${id}`, { method:'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    showToast('鍒犻櫎鎴愬姛');
    loadList();
  } catch(e) {
    showToast('鍒犻櫎澶辫触: ' + e.message, 'error');
  }
}

// ===== LOAD LIST =====
async function loadList() {
  const c = document.getElementById('mainContent');
  try {
    const res = await fetch(`${API}/${currentTab}`);
    const items = await res.json();

    // Update stats
    document.getElementById('stats').innerHTML = `
      ${currentTab==='articles'?'鏂囩珷':'妗堜緥'}鏁伴噺<br><strong>${items.length}</strong>
    `;

    if (!items.length) {
      c.innerHTML = `<div class="empty-state"><div class="big">馃摥</div><p>鏆傛棤${currentTab==='articles'?'鏂囩珷':'妗堜緥'}</p><button class="btn btn-primary" onclick="openModal()">+ 鏂板缓${currentTab==='articles'?'鏂囩珷':'妗堜緥'}</button></div>`;
      return;
    }

    if (currentTab === 'articles') {
      c.innerHTML = `<div class="card-grid">${items.map(a => `
        <div class="card">
          <div class="card-head"><h4>${a.title}</h4></div>
          <div class="card-meta"><span>馃搮 ${a.date||'鏈瀹?}</span><span>馃彿锔?${a.category||'鏈垎绫?}</span></div>
          <div class="card-body">${a.summary||'鏆傛棤鎽樿'}</div>
          <div class="card-tags">${(a.tags||[]).map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
          <div class="card-actions">
            <button class="btn btn-ghost btn-sm" onclick='editItem(${JSON.stringify(a)})'>鉁忥笍 缂栬緫</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem(${a.id})">馃棏 鍒犻櫎</button>
          </div>
        </div>
      `).join('')}</div>`;
    } else {
      c.innerHTML = `<div class="card-grid">${items.map(cs => `
        <div class="card">
          <div class="case-card-admin">
            <div class="case-emoji ${cs.bg}">${cs.emoji}</div>
            <div style="flex:1">
              <div class="card-head"><h4>${cs.title}</h4></div>
              <span class="card-tag" style="margin-bottom:8px;display:inline-block;">${cs.tag||''}</span>
              <div class="card-body">${cs.desc||''}</div>
              <div class="case-kpi-admin">${(cs.kpi||[]).map(k => `<div><div class="kv">${k.value}</div><div class="kl">${k.label}</div></div>`).join('')}</div>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn btn-ghost btn-sm" onclick='editItem(${JSON.stringify(cs)})'>鉁忥笍 缂栬緫</button>
            <button class="btn btn-danger btn-sm" onclick="deleteItem(${cs.id})">馃棏 鍒犻櫎</button>
          </div>
        </div>
      `).join('')}</div>`;
    }
  } catch(e) {
    c.innerHTML = `<div class="empty-state"><div class="big">鉂?/div><p>鍔犺浇澶辫触锛岃纭 manage.py 宸插惎鍔?/p></div>`;
    document.getElementById('statusText').textContent = '鏈繛鎺?;
    document.querySelector('#topStatus .dot').className = 'dot err';
  }
}

function editItem(item) {
  openModal(item);
}

// ===== PUBLISH =====
async function doPublish() {
  if (!confirm('纭畾瑕佸彂甯冨埌 GitHub Pages锛焅n杩欏皢鎻愪氦鎵€鏈夋洿鏀瑰苟鎺ㄩ€佸埌绾夸笂銆?)) return;
  const btn = document.getElementById('btnPublish');
  const origText = btn.textContent;
  btn.textContent = '鈴?鍙戝竷涓?..';
  btn.disabled = true;
  document.querySelector('#topStatus .dot').className = 'dot sync';
  document.getElementById('statusText').textContent = '鍙戝竷涓?..';

  try {
    const res = await fetch(`${API}/publish`, { method:'POST' });
    if (!res.ok) throw new Error(await res.text());
    const result = await res.json();
    showToast('鉁?鍙戝竷鎴愬姛锛?-2鍒嗛挓鍚庣敓鏁?, 'success');
    document.querySelector('#topStatus .dot').className = 'dot ok';
    document.getElementById('statusText').textContent = '宸插彂甯?;
  } catch(e) {
    showToast('鍙戝竷澶辫触: ' + e.message, 'error');
    document.querySelector('#topStatus .dot').className = 'dot err';
    document.getElementById('statusText').textContent = '鍙戝竷澶辫触';
  }
  btn.textContent = origText;
  btn.disabled = false;
}
